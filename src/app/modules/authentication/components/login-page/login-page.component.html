<div class="login-page">
  <mat-card class="login-card">
    <div class="card-header">
      <h1>Bine ai revenit!</h1>
      <p>Autentifică-te pentru a continua în BookLoop.</p>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <mat-form-field appearance="outline">
          <mat-label>Adresă de email</mat-label>

          <mat-icon matPrefix>mail_outline</mat-icon>

          <input
            matInput
            formControlName="email"
            placeholder="email@exemplu.ro"
            type="email"
            required
          />

          <mat-error *ngIf="loginForm.controls.email.hasError('required')">
            Adresa de email este obligatorie.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Parolă</mat-label>

          <mat-icon matPrefix>lock_outline</mat-icon>

          <input
            matInput
            formControlName="password"
            [type]="hide ? 'password' : 'text'"
            required
          />

          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hide = !hide"
            [attr.aria-label]="hide ? 'Afișează parola' : 'Ascunde parola'"
          >
            <mat-icon>
              {{ hide ? "visibility_off" : "visibility" }}
            </mat-icon>
          </button>

          <mat-error *ngIf="loginForm.controls.password.hasError('required')">
            Parola este obligatorie.
          </mat-error>
        </mat-form-field>

        <a class="forgot-password-link" routerLink="/auth/forgot-password">
          Ai uitat parola?
        </a>

        <button
          class="login-button"
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loginForm.invalid"
        >
          Autentificare
        </button>
      </form>

      <div class="register-section">
        <span>Nu ai cont?</span>
        <a routerLink="/auth/register">Creează unul</a>
      </div>

      <a class="guest-link" routerLink="/">
        <mat-icon>arrow_back</mat-icon>
        Continuă fără autentificare
      </a>
    </mat-card-content>
  </mat-card>
</div>
