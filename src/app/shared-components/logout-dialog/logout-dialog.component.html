<h2 mat-dialog-title>Delogare</h2>

<mat-dialog-content>
  Ești sigur că dorești să te deloghezi?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">Renunță</button>

  <button mat-flat-button color="primary" (click)="logout()">Delogare</button>
</mat-dialog-actions>
